<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS ADVANCED OPPGAVE 2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="box">
        <div>
          <h1>Lær Pseudo-elementer</h1>
          <ul>
            Gaming
          </ul>
          <ul>
            Fotball
          </ul>
          <ul>
            Golf
          </ul>
          <ul>
            Sykkling
          </ul>
          <ul>
            Skating
          </ul>
        </div>
      </section>

      <form action="">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Ola" required />
        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          name="email"
          placeholder="Nordmann"
          required
        />
        <label for="textarea">Message</label>
        <textarea id="textarea" name="textarea"></textarea>

        <label for="submit"></label>
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
