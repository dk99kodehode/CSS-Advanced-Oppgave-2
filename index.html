<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS ADVANCED OPPGAVE 2</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <section class="box">
        <div>
          <h1>Lær Pseudo-elementer</h1>
          <ul>
            <li>Gaming</li>
            <li>Fotball</li>
            <li>Golf</li>
            <li>Sykkling</li>
          </ul>
        </div>
        <h2>:NOT(not-blue)</h2>
        <p class="not-blue">NOT BLUE</p>
        <p>BLUE</p>

        <h2>First and last child</h2>
        <div class="target-child">
          <p>1st child</p>
          <p>Last child</p>
        </div>
      </section>

      <form action="">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Ola" required />
        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          name="email"
          placeholder="Nordmann"
          required
        />
        <label for="textarea">Message</label>
        <textarea id="textarea" name="textarea"></textarea>

        <label for="submit"></label>
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
